#这个也是一个配置文件，启动后端时去执行application.module()，监听8080端口，链接本地H2数据库，数据库对象名转成小写
ktor:
    application:
        modules:
            - com.example.ApplicationKt.module
            #启动时要调用的模块
    deployment:
        port: 8080
        #启动时要监听的端口号

db:
  url: "jdbc:h2:file:./data/fitness;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE"
#jdbc:h2:file:./data/fitness
#意思是：使用 H2 数据库，并且是“文件型数据库”，数据保存在项目目录下的 data/fitness 里。
#不是存在内存里，所以重启后数据还在。

#MODE=PostgreSQL
#意思是：让 H2 尽量模拟 PostgreSQL 的行为。
#这样以后如果想切 PostgreSQL，SQL 兼容性会好一些。

#DATABASE_TO_LOWER=TRUE
#意思是：数据库对象名转成小写。
#比如表名、字段名会按小写处理，减少大小写问题。

#password: ""
#数据库密码为空字符串，也就是没设密码。
  driver: "org.h2.Driver"
 #driver: "org.h2.Driver"
 #指定 JDBC 驱动类，告诉程序“你现在连的是 H2”
  user: "sa"
  #user: "sa"
  #H2 默认用户名，sa 可以理解成系统管理员账号名。

  password: ""

auth:
  tokenTtlHours: 168
  #tokenTtlHours: 168
  #意思是：登录 token 的有效期是 168 小时，也就是：7 天

seed:
  adminEmail: "admin@example.com"
  adminPassword: "admin"
  #这一段是“初始化种子数据”配置。

 #adminEmail
 #默认管理员邮箱

 #adminPassword
 #默认管理员密码

 #它的作用是：项目第一次启动时，如果数据库里还没有这个管理员账号，
 #DatabaseFactory.kt (line 61) 会自动创建一个管理员用户。
